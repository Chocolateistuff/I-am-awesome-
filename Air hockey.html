<!DOCTYPE html>
<html lang="en">
<head>
    <title>Galactic Air Hockey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Pacifico&display=swap');

        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif;
        }

        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { 
            position: absolute; background: white; border-radius: 50%; 
            box-shadow: 0 0 4px #fff, 0 0 8px #4fc3f7;
            animation: twinkle 4s infinite; 
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
        
        #game-container { z-index: 1; display: flex; flex-direction: column; align-items: center; }
        
        #scoreboard { 
            font-size: 32px; margin-bottom: 15px; color: #4fc3f7; 
            background: rgba(79, 195, 247, 0.1); padding: 10px 40px; border-radius: 50px; 
            border: 3px solid #4fc3f7; box-shadow: 0 0 15px #4fc3f7;
        }
        
        canvas { 
            background: rgba(10, 25, 47, 0.8); 
            border: 15px solid #0097a7; 
            border-radius: 30px; 
            box-shadow: 0 0 40px rgba(0, 151, 167, 0.6);
        }

        #victory-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center; z-index: 10;
            background: rgba(0,0,0,0.85);
        }
        #victory-text {
            font-family: 'Pacifico', cursive; font-size: 110px;
            background: linear-gradient(to right, #ff00cc, #3333ff, #00ffcc, #ffcc00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 4px 4px 10px rgba(255,255,255,0.3);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #comet {
            position: absolute; left: -300px; top: -300px; width: 300px; height: 100px;
            background: linear-gradient(90deg, #ffffff, #64b5f6, transparent);
            clip-path: polygon(0% 40%, 100% 0%, 100% 100%, 0% 60%);
            display: none; opacity: 0.9;
        }
        @keyframes cometShoot {
            0% { left: -400px; top: -200px; transform: rotate(-25deg) scale(0.5); }
            100% { left: 110%; top: 110%; transform: rotate(-25deg) scale(1.5); }
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>
    <div id="comet"></div>
    <div id="victory-overlay"><div id="victory-text">P1 WINS!!!</div></div>
    
    <div id="game-container">
        <div id="scoreboard">P1: <span id="p1">0</span> | P2: <span id="p2">0</span></div>
        <canvas id="game" width="800" height="400"></canvas>
    </div>

<script>
    const starContainer = document.getElementById('stars');
    for(let i=0; i<150; i++) {
        let s = document.createElement('div');
        s.className = 'star';
        s.style.width = s.style.height = Math.random()*3 + 1 + 'px';
        s.style.left = Math.random()*100 + '%';
        s.style.top = Math.random()*100 + '%';
        s.style.animationDelay = Math.random()*4 + 's';
        starContainer.appendChild(s);
    }

    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    let p1 = {x: 20, y: 165, r: 35}, p2 = {x: 745, y: 165, r: 35}, ball = {x: 400, y: 200, dx: 6, dy: 6, r: 20}, p1s = 0, p2s = 0, isGameOver = false;
    const keys = {};

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function drawTable() {
        ctx.strokeStyle = '#00acc1'; ctx.lineWidth = 4; ctx.setLineDash([15, 15]);
        ctx.beginPath(); ctx.moveTo(400, 0); ctx.lineTo(400, 400); ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath(); ctx.arc(400, 200, 70, 0, Math.PI*2); ctx.stroke();
        ctx.strokeStyle = '#00838f';
        ctx.strokeRect(0, 100, 60, 200);
        ctx.strokeRect(740, 100, 60, 200);
    }

    function drawPaddle(p) {
        ctx.fillStyle = '#6a1b9a'; 
        ctx.beginPath(); ctx.arc(p.x + 35, p.y + 35, p.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ab47bc'; 
        ctx.beginPath(); ctx.arc(p.x + 35, p.y + 20, 22, 0, Math.PI*2); ctx.fill();
    }

    function update() {
        if(isGameOver) return;
        // Updated to W and S for Player 1
        if (keys['KeyW'] && p1.y > 0) p1.y -= 10;
        if (keys['KeyS'] && p1.y < 330) p1.y += 10;
        if (keys['ArrowUp'] && p2.y > 0) p2.y -= 10;
        if (keys['ArrowDown'] && p2.y < 330) p2.y += 10;

        ball.x += ball.dx; ball.y += ball.dy;
        if (ball.y < ball.r || ball.y > 400 - ball.r) ball.dy *= -1;

        function checkCollision(p) {
            let dx = ball.x - (p.x + 35), dy = ball.y - (p.y + 35), distance = Math.sqrt(dx*dx + dy*dy);
            if (distance < ball.r + p.r) { ball.dx = -ball.dx * 1.01; ball.x += ball.dx; }
        }
        checkCollision(p1); checkCollision(p2);

        if (ball.x < 0) { p2s++; resetBall(); } else if (ball.x > 800) { p1s++; resetBall(); }
        document.getElementById('p1').innerText = p1s; document.getElementById('p2').innerText = p2s;
        if (p1s >= 10 || p2s >= 10) declareWinner(p1s >= 10 ? 1 : 2);
    }

    function declareWinner(p) {
        isGameOver = true;
        document.getElementById('victory-text').innerText = `P${p} WINS!!!`;
        const comet = document.getElementById('comet');
        comet.style.display = 'block';
        comet.style.animation = 'cometShoot 4s forwards';
        setTimeout(() => { document.getElementById('victory-overlay').style.display = 'flex'; }, 1000);
        setTimeout(() => { document.getElementById('victory-overlay').style.display = 'none'; comet.style.display = 'none'; p1s = 0; p2s = 0; isGameOver = false; resetBall(); }, 6000);
    }

    function resetBall() { ball = {x: 400, y: 200, dx: 6*(Math.random()>0.5?1:-1), dy: 6*(Math.random()>0.5?1:-1), r: 20}; }

    function draw() {
        ctx.clearRect(0,0,800,400); drawTable();
        ctx.fillStyle = '#e1bee7'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#6a1b9a'; ctx.lineWidth = 4; ctx.stroke();
        drawPaddle(p1); drawPaddle(p2); update(); requestAnimationFrame(draw);
    }
    resetBall(); draw();
</script>
</body>
</html>
